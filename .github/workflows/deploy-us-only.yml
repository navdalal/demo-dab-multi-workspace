name: deploy-us-only

on:
  push:
    branches: [main]
    paths:
      - 'bundles/us_only/**'
      - 'shared/**'
      - '.github/workflows/deploy-us-only.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: deploy us_only to US1
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_US1 }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID_US1 }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET_US1 }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate bundle
        working-directory: bundles/us_only
        run: databricks bundle validate -t us1

      - name: Deploy bundle
        working-directory: bundles/us_only
        run: databricks bundle deploy -t us1
